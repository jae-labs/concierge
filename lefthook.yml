# Lefthook Git Hooks
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    go-fmt:
      glob: "**/*.go"
      run: gofmt -w {staged_files}
    go-lint:
      glob: "**/*.go"
      run: golangci-lint run --timeout=5m

pre-push:
  commands:
    go-test:
      glob: "**/*.go"
      run: go test -v -race ./...
