name: CI

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version-file: src/go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # ratchet:golangci/golangci-lint-action@v9
        with:
          version: v2.6.1
          working-directory: src
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version-file: src/go.mod

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # ratchet:codecov/codecov-action@v6
        with:
          file: ./src/coverage.out
          flags: unittests
          fail_ci_if_error: false
        continue-on-error: true

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        arch: [amd64, arm64]
        exclude:
          - os: ubuntu-latest
            arch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version-file: src/go.mod

      - name: Build
        run: |
          cd src/cmd/concierge
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.arch }} go build -v .
          else
            CGO_ENABLED=0 GOOS=darwin GOARCH=${{ matrix.arch }} go build -v .
          fi

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Run Gosec security scanner
        uses: securego/gosec@6351b0c6fcc7d75acb230a9be7f9047aada322ae # ratchet:securego/gosec@master
        with:
          args: "./src/..."
        continue-on-error: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@314ff8b43182423b84c50b1670b0e10f858f2d98 # ratchet:aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "src"
          format: "sarif"
          output: "trivy-results.sarif"
        continue-on-error: true
