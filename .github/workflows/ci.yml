name: CI

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "terraform/**"
      - "ansible/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
      - "terraform/**"
      - "ansible/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"

permissions:
  contents: read

jobs:
  # --- GO BOT JOBS ---
  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version-file: src/go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # ratchet:golangci/golangci-lint-action@v9
        with:
          version: v2.6.1
          working-directory: src
          args: --timeout=5m

  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version-file: src/go.mod

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # ratchet:codecov/codecov-action@v6
        with:
          file: ./src/coverage.out
          flags: unittests
          fail_ci_if_error: false
        continue-on-error: true

  go-build:
    name: Go Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        arch: [amd64, arm64]
        exclude:
          - os: ubuntu-latest
            arch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version-file: src/go.mod

      - name: Build
        run: |
          cd src/cmd/concierge
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.arch }} go build -v .
          else
            CGO_ENABLED=0 GOOS=darwin GOARCH=${{ matrix.arch }} go build -v .
          fi

  go-security:
    name: Go Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Run Gosec security scanner
        uses: securego/gosec@bd17b2589eb634e511b352f14fc30cb40863eefe # ratchet:securego/gosec@master
        with:
          args: "./src/..."
        continue-on-error: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@314ff8b43182423b84c50b1670b0e10f858f2d98 # ratchet:aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "src"
          format: "sarif"
          output: "trivy-results.sarif"
        continue-on-error: true

  # --- TERRAFORM JOBS ---
  tf-fmt:
    name: Terraform Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # ratchet:hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.5"

      - name: Check Formatting
        run: terraform fmt -check -recursive terraform

  tf-tflint:
    name: Terraform Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # ratchet:terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: Run TFLint
        run: tflint --recursive --chdir=terraform --config="$GITHUB_WORKSPACE/terraform/.tflint.hcl"

  tf-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - terraform/github
          - terraform/cloudflare
          - terraform/doppler
          - terraform/oci
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # ratchet:hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.5"

      - name: Create dummy GCP credentials
        run: |
          PEM_START="-----BEGIN "
          PEM_START="${PEM_START}PRIVATE KEY-----"
          PEM_END="-----END "
          PEM_END="${PEM_END}PRIVATE KEY-----"
          cat << EOF > /tmp/dummy-gcp-key.json
          {
            "type": "service_account",
            "project_id": "dummy-project",
            "private_key_id": "dummy-key-id",
            "private_key": "${PEM_START}\nMIIEvgIBADANBgkqhkiG9w0BAQEFAASCBKgwggSkAgEAAoIBAQC3Y2Fk\n${PEM_END}\n",
            "client_email": "dummy@dummy-project.iam.gserviceaccount.com",
            "client_id": "1234567890",
            "auth_uri": "https://accounts.google.com/o/oauth2/auth",
            "token_uri": "https://oauth2.googleapis.com/token",
            "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs",
            "client_x509_cert_url": "https://www.googleapis.com/metadata/x1"
          }
          EOF

      - name: Terraform Init (Offline)
        run: terraform init -backend=false
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/dummy-gcp-key.json

      - name: Terraform Validate
        run: terraform validate

  # --- ANSIBLE JOBS ---
  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    env:
      ANSIBLE_ROLES_PATH: ansible/roles
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # ratchet:actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Ansible & ansible-lint
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible-lint oci

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Run ansible-lint
        run: ansible-lint

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # ratchet:docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # ratchet:docker/build-push-action@v6
        with:
          context: src
          load: true
          tags: concierge:ci-test

      - name: Run Trivy vulnerability scanner on image
        uses: aquasecurity/trivy-action@314ff8b43182423b84c50b1670b0e10f858f2d98 # ratchet:aquasecurity/trivy-action@master
        with:
          image-ref: 'concierge:ci-test'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'
