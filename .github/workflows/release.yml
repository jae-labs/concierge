name: Release

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "ansible/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"

permissions:
  contents: write
  packages: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version-file: src/go.mod

      - name: Build binary
        run: |
          cd src/cmd/concierge
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.arch }} \
          go build -ldflags="-s -w" -o dist/concierge-linux-${{ matrix.arch }}

      - name: Create tarball
        run: |
          cd src/cmd/concierge/dist
          tar -czf concierge-linux-${{ matrix.arch }}.tar.gz concierge-linux-${{ matrix.arch }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          name: concierge-linux-${{ matrix.arch }}
          path: |
            src/cmd/concierge/dist/concierge-linux-${{ matrix.arch }}.tar.gz
            src/cmd/concierge/dist/concierge-linux-${{ matrix.arch }}

  build-darwin:
    name: Build macOS
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version-file: src/go.mod

      - name: Build binary
        run: |
          cd src/cmd/concierge
          mkdir -p dist
          CGO_ENABLED=0 GOOS=darwin GOARCH=${{ matrix.arch }} \
          go build -ldflags="-s -w" -o dist/concierge-darwin-${{ matrix.arch }}

      - name: Create tarball
        run: |
          cd src/cmd/concierge/dist
          tar -czf concierge-darwin-${{ matrix.arch }}.tar.gz concierge-darwin-${{ matrix.arch }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          name: concierge-darwin-${{ matrix.arch }}
          path: |
            src/cmd/concierge/dist/concierge-darwin-${{ matrix.arch }}.tar.gz
            src/cmd/concierge/dist/concierge-darwin-${{ matrix.arch }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-darwin]
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8
        with:
          path: artifacts

      - name: Organize release files
        run: |
          mkdir -p dist
          find artifacts -name "*.tar.gz" -exec cp {} dist/ \;
          find artifacts -name "concierge-*" -type f ! -name "*.tar.gz" -exec cp {} dist/ \;
          ls -lh dist/

      - name: Generate version tag
        id: tag
        run: |
          git fetch --tags --force || true

          LATEST_TAG=$(git tag -l "v*.*.*" --sort=-v:refname | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            NEW_VERSION="v0.0.1"
            echo "No previous tag found, creating initial version: $NEW_VERSION"
          else
            VERSION=${LATEST_TAG#v}
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
            echo "Incrementing from $LATEST_TAG to $NEW_VERSION"
          fi

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          LATEST_TAG=$(git tag -l "v*.*.*" --sort=-v:refname | head -n 1)

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          if [ -z "$LATEST_TAG" ]; then
            echo "Initial release" >> $GITHUB_OUTPUT
          else
            git log --oneline --no-decorate ${LATEST_TAG}..HEAD >> $GITHUB_OUTPUT 2>/dev/null || echo "No changes since last release" >> $GITHUB_OUTPUT
          fi
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create versioned GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # ratchet:softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: ${{ steps.tag.outputs.version }}
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.changelog }}
          files: dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # ratchet:docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # ratchet:docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # ratchet:docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # ratchet:docker/build-push-action@v6
        with:
          context: src
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/jae-labs/concierge:${{ needs.release.outputs.version }}
            ghcr.io/jae-labs/concierge:latest

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [release, docker-image]
    environment: production
    concurrency:
      group: concierge-deploy-${{ github.repository }}
      cancel-in-progress: false
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Install Ansible
        run: |
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user ansible

      - name: Add local Python bin to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Bootstrap Ansible dependencies
        run: |
          cd ansible
          bash bootstrap.sh

      - name: Configure OCI auth
        run: |
          mkdir -p "$HOME/.oci"
          printf '%s' "$OCI_PRIVATE_KEY" > "$HOME/.oci/oci_api_key.pem"
          chmod 600 "$HOME/.oci/oci_api_key.pem"
          {
            printf '[DEFAULT]\n'
            printf 'user=%s\n' "$OCI_USER_OCID"
            printf 'fingerprint=%s\n' "$OCI_FINGERPRINT"
            printf 'tenancy=%s\n' "$OCI_TENANCY_OCID"
            printf 'region=%s\n' "$OCI_REGION"
            printf 'key_file=%s/.oci/oci_api_key.pem\n' "$HOME"
            if [ -n "${OCI_PRIVATE_KEY_PASSPHRASE:-}" ]; then
              printf 'pass_phrase=%s\n' "$OCI_PRIVATE_KEY_PASSPHRASE"
            fi
          } > "$HOME/.oci/config"
          chmod 600 "$HOME/.oci/config"
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_PRIVATE_KEY_PASSPHRASE: ${{ secrets.OCI_PRIVATE_KEY_PASSPHRASE }}

      - name: Configure SSH
        run: |
          mkdir -p "$HOME/.ssh"
          printf '%s' "$OCI_SSH_PRIVATE_KEY_B64" | base64 -d > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          ssh-keygen -y -f "$HOME/.ssh/id_ed25519" >/dev/null
          ssh-keyscan -H oci.justanother.engineer > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"
        env:
          OCI_SSH_PRIVATE_KEY_B64: ${{ secrets.OCI_SSH_PRIVATE_KEY_B64 }}

      - name: Prepare deploy variables
        id: deploy-vars
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
              "concierge_image_tag": os.environ["IMAGE_TAG"],
              "concierge_env": {
                  "SLACK_BOT_TOKEN": os.environ["SLACK_BOT_TOKEN"],
                  "SLACK_SIGNING_SECRET": os.environ["SLACK_SIGNING_SECRET"],
                  "SLACK_REQUESTS_CHANNEL_ID": os.environ["SLACK_REQUESTS_CHANNEL_ID"],
                  "SLACK_USER_IDS": os.environ["SLACK_USER_IDS"],
                  "SLACK_MANAGER_IDS": os.environ["SLACK_MANAGER_IDS"],
                  "SLACK_ADMIN_IDS": os.environ["SLACK_ADMIN_IDS"],
                  "GITHUB_APP_ID": os.environ["APP_ID"],
                  "GITHUB_APP_INSTALLATION_ID": os.environ["APP_INSTALLATION_ID"],
                  "GITHUB_APP_PRIVATE_KEY": os.environ["APP_PRIVATE_KEY"],
                  "GITHUB_OWNER": os.environ["APP_OWNER"],
                  "GITHUB_REPO": os.environ["APP_REPO"],
              },
          }

          vars_file = Path(os.environ["RUNNER_TEMP"]) / "concierge-deploy-vars.json"
          vars_file.write_text(json.dumps(payload))

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"vars_file={vars_file}\n")
          PY
        env:
          IMAGE_TAG: ${{ needs.release.outputs.version }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_REQUESTS_CHANNEL_ID: ${{ secrets.SLACK_REQUESTS_CHANNEL_ID || vars.SLACK_REQUESTS_CHANNEL_ID }}
          SLACK_USER_IDS: ${{ secrets.SLACK_USER_IDS || vars.SLACK_USER_IDS }}
          SLACK_MANAGER_IDS: ${{ secrets.SLACK_MANAGER_IDS || vars.SLACK_MANAGER_IDS }}
          SLACK_ADMIN_IDS: ${{ secrets.SLACK_ADMIN_IDS || vars.SLACK_ADMIN_IDS }}
          APP_ID: ${{ secrets.CONCIERGE_GH_APP_ID }}
          APP_INSTALLATION_ID: ${{ secrets.CONCIERGE_GH_APP_INSTALLATION_ID }}
          APP_PRIVATE_KEY: ${{ secrets.CONCIERGE_GH_APP_PRIVATE_KEY }}
          APP_OWNER: ${{ secrets.CONCIERGE_GH_OWNER || vars.CONCIERGE_GH_OWNER }}
          APP_REPO: ${{ secrets.CONCIERGE_GH_REPO || vars.CONCIERGE_GH_REPO }}

      - name: Ansible syntax check
        run: |
          cd ansible
          ansible-playbook -i inventory/oci.oci.yml playbooks/site.yml --syntax-check -e @"${{ steps.deploy-vars.outputs.vars_file }}"
        env:
          TF_VAR_SSH_INGRESS_CIDR: ${{ secrets.OCI_SSH_INGRESS_CIDR || vars.OCI_SSH_INGRESS_CIDR }}
          GRAFANA_CLOUD_PROMETHEUS_URL: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_URL }}
          GRAFANA_CLOUD_PROMETHEUS_USERNAME: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_USERNAME }}
          GRAFANA_CLOUD_PROMETHEUS_TOKEN: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_TOKEN }}
          GRAFANA_CLOUD_LOKI_URL: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          GRAFANA_CLOUD_LOKI_USERNAME: ${{ secrets.GRAFANA_CLOUD_LOKI_USERNAME }}
          GRAFANA_CLOUD_LOKI_TOKEN: ${{ secrets.GRAFANA_CLOUD_LOKI_TOKEN }}
          GRAFANA_CLOUD_TEMPO_URL: ${{ secrets.GRAFANA_CLOUD_TEMPO_URL }}
          GRAFANA_CLOUD_TEMPO_USERNAME: ${{ secrets.GRAFANA_CLOUD_TEMPO_USERNAME }}
          GRAFANA_CLOUD_TEMPO_TOKEN: ${{ secrets.GRAFANA_CLOUD_TEMPO_TOKEN }}
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ${{ secrets.SENTRY_ENVIRONMENT || vars.SENTRY_ENVIRONMENT }}
          SENTRY_RELEASE: ${{ github.ref_name }}

      - name: Deploy released binary to OCI
        run: |
          cd ansible
          ansible-playbook -i inventory/oci.oci.yml playbooks/site.yml -e @"${{ steps.deploy-vars.outputs.vars_file }}"
        env:
          TF_VAR_SSH_INGRESS_CIDR: ${{ secrets.OCI_SSH_INGRESS_CIDR || vars.OCI_SSH_INGRESS_CIDR }}
          GRAFANA_CLOUD_PROMETHEUS_URL: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_URL }}
          GRAFANA_CLOUD_PROMETHEUS_USERNAME: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_USERNAME }}
          GRAFANA_CLOUD_PROMETHEUS_TOKEN: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_TOKEN }}
          GRAFANA_CLOUD_LOKI_URL: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          GRAFANA_CLOUD_LOKI_USERNAME: ${{ secrets.GRAFANA_CLOUD_LOKI_USERNAME }}
          GRAFANA_CLOUD_LOKI_TOKEN: ${{ secrets.GRAFANA_CLOUD_LOKI_TOKEN }}
          GRAFANA_CLOUD_TEMPO_URL: ${{ secrets.GRAFANA_CLOUD_TEMPO_URL }}
          GRAFANA_CLOUD_TEMPO_USERNAME: ${{ secrets.GRAFANA_CLOUD_TEMPO_USERNAME }}
          GRAFANA_CLOUD_TEMPO_TOKEN: ${{ secrets.GRAFANA_CLOUD_TEMPO_TOKEN }}
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ${{ secrets.SENTRY_ENVIRONMENT || vars.SENTRY_ENVIRONMENT }}
          SENTRY_RELEASE: ${{ github.ref_name }}

      - name: Verify deployed service
        run: |
          ssh -o BatchMode=yes ubuntu@oci.justanother.engineer 'systemctl is-active concierge && systemctl is-enabled concierge'
          ts=$(date +%s)
          body='{"type":"url_verification","token":"token","challenge":"workflow-probe"}'
          sig=$(printf 'v0:%s:%s' "$ts" "$body" | openssl dgst -sha256 -hmac "$SLACK_SIGNING_SECRET" -hex | awk '{print $2}')
          response=$(curl -qsk -X POST https://oci.justanother.engineer/slack/events \
            -H 'Content-Type: application/json' \
            -H "X-Slack-Request-Timestamp: $ts" \
            -H "X-Slack-Signature: v0=$sig" \
            --data "$body")
          test "$response" = '{"challenge":"workflow-probe"}'
        env:
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}

      - name: Cleanup deploy credentials
        if: always()
        run: |
          rm -f "$HOME/.oci/config" "$HOME/.oci/oci_api_key.pem"
          rm -f "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"
          rm -f "${{ steps.deploy-vars.outputs.vars_file }}"

      - name: Update latest tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push origin -f latest

      - name: Delete existing latest release
        uses: dev-drprasad/delete-tag-and-release@82600feb9527126eca69833f07bafe53279bd9b4 # ratchet:dev-drprasad/delete-tag-and-release@v1.1
        with:
          tag_name: latest
          github_token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Create latest release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # ratchet:softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: "Latest"
          body: |
            ## Latest

            This is an automatically generated release from the latest `main` branch.
          files: dist/*
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
