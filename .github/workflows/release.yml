name: Release

on:
  push:
    branches:
      - main
    paths:
      - "bot/slack/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version-file: bot/slack/go.mod

      - name: Build binary
        run: |
          cd bot/slack/cmd/concierge
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.arch }} \
          go build -ldflags="-s -w" -o dist/concierge-linux-${{ matrix.arch }}

      - name: Create tarball
        run: |
          cd bot/slack/cmd/concierge/dist
          tar -czf concierge-linux-${{ matrix.arch }}.tar.gz concierge-linux-${{ matrix.arch }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          name: concierge-linux-${{ matrix.arch }}
          path: |
            bot/slack/cmd/concierge/dist/concierge-linux-${{ matrix.arch }}.tar.gz
            bot/slack/cmd/concierge/dist/concierge-linux-${{ matrix.arch }}

  build-darwin:
    name: Build macOS
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version-file: bot/slack/go.mod

      - name: Build binary
        run: |
          cd bot/slack/cmd/concierge
          mkdir -p dist
          CGO_ENABLED=0 GOOS=darwin GOARCH=${{ matrix.arch }} \
          go build -ldflags="-s -w" -o dist/concierge-darwin-${{ matrix.arch }}

      - name: Create tarball
        run: |
          cd bot/slack/cmd/concierge/dist
          tar -czf concierge-darwin-${{ matrix.arch }}.tar.gz concierge-darwin-${{ matrix.arch }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          name: concierge-darwin-${{ matrix.arch }}
          path: |
            bot/slack/cmd/concierge/dist/concierge-darwin-${{ matrix.arch }}.tar.gz
            bot/slack/cmd/concierge/dist/concierge-darwin-${{ matrix.arch }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-darwin]
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8
        with:
          path: artifacts

      - name: Organize release files
        run: |
          mkdir -p dist
          find artifacts -name "*.tar.gz" -exec cp {} dist/ \;
          find artifacts -name "concierge-*" -type f ! -name "*.tar.gz" -exec cp {} dist/ \;
          ls -lh dist/

      - name: Generate version tag
        id: tag
        run: |
          git fetch --tags --force || true

          LATEST_TAG=$(git tag -l "v*.*.*" --sort=-v:refname | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            NEW_VERSION="v0.0.1"
            echo "No previous tag found, creating initial version: $NEW_VERSION"
          else
            VERSION=${LATEST_TAG#v}
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
            echo "Incrementing from $LATEST_TAG to $NEW_VERSION"
          fi

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          LATEST_TAG=$(git tag -l "v*.*.*" --sort=-v:refname | head -n 1)

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          if [ -z "$LATEST_TAG" ]; then
            echo "Initial release" >> $GITHUB_OUTPUT
          else
            git log --oneline --no-decorate ${LATEST_TAG}..HEAD >> $GITHUB_OUTPUT 2>/dev/null || echo "No changes since last release" >> $GITHUB_OUTPUT
          fi
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create versioned GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # ratchet:softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: ${{ steps.tag.outputs.version }}
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.changelog }}
          files: dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push origin -f latest

      - name: Delete existing latest release
        uses: dev-drprasad/delete-tag-and-release@82600feb9527126eca69833f07bafe53279bd9b4 # ratchet:dev-drprasad/delete-tag-and-release@v1.1
        with:
          tag_name: latest
          github_token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Create latest release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # ratchet:softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: "Latest"
          body: |
            ## Latest

            This is an automatically generated release from the latest `main` branch.
          files: dist/*
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
