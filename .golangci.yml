version: "2"

run:
  timeout: 5m
  relative-path-mode: gomod

linters:
  default: none
  enable:
    - errcheck
    - errorlint
    - gosec
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused
    - whitespace

  exclusions:
    presets:
      - common-false-positives
      - std-error-handling
    rules:
      - path: (.+)_test\.go
        linters:
          - gosec
        text: "G101: Potential hardcoded credentials"
